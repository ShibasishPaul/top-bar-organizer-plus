env:
  es2021: true
extends: 'eslint:recommended'
parserOptions:
  ecmaVersion: 2022
rules:
  indent:
    - error
    - 4
    - SwitchCase: 1
  linebreak-style:
    - error
    - unix
  quotes:
    - error
    - double
  semi:
    - error
    - always
  no-unused-vars:
    - error
    - argsIgnorePattern: "^_"
globals:
  imports: readonly
