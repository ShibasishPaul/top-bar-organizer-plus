env:
  es2021: true
extends: 'eslint:recommended'
parserOptions:
  ecmaVersion: 2022
  sourceType: module
rules:
  indent:
    - error
    - 4
    - SwitchCase: 1
  linebreak-style:
    - error
    - unix
  quotes:
    - error
    - double
  semi:
    - error
    - always
  no-unused-vars:
    - error
    - argsIgnorePattern: "^_"
  curly:
    - error
    - all
  brace-style:
    - error
    - 1tbs
  # Rules from GJS Style Guide regarding whitespace.
  # See here: https://gjs.guide/guides/gjs/style-guide.html#whitespace
  func-call-spacing:
    - error
    - never
  array-bracket-spacing:
    - error
    - never
  space-before-function-paren:
    - error
    - never
  space-before-blocks:
    - error
    - always
  key-spacing:
    - error
    - beforeColon: false
      afterColon: true
      mode: strict
  object-curly-spacing:
    - error
    - always
  comma-dangle:
    - error
    - arrays: always-multiline
      objects: always-multiline
      imports: always-multiline
      exports: always-multiline
      functions: never
globals:
  log: readonly
